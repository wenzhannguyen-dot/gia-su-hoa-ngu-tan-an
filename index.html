<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>To-Do List Application</title>
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <h1>📋 My To-Do List</h1>
            
            <div class="input-container">
                <input 
                    type="text" 
                    id="taskInput" 
                    placeholder="Add a new task..." 
                    class="task-input"
                >
                <button id="addBtn" class="add-btn">Add Task</button>
            </div>
            
            <div class="stats">
                <span class="stat">Total: <span id="totalCount">0</span></span>
                <span class="stat">Completed: <span id="completedCount">0</span></span>
            </div>
            
            <div id="taskList" class="task-list">
                <!-- Tasks will be added here -->
            </div>
            
            <button id="clearBtn" class="clear-btn">Clear Completed</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
