<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÀI 04: 您贵姓 | Gia Sư Hoa Ngữ Tân An</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --purple: #7c3aed;
            --purple-dark: #6d28d9;
            --purple-light: #8b5cf6;
            --orange: #f59e0b;
            --orange-dark: #d97706;
            --green: #10b981;
            --green-dark: #059669;
            --green-light: #d1fae5;
            --gray: #6b7280;
            --gray-light: #e5e7eb;
            --gray-dark: #374151;
            --white: #ffffff;
            --cream: #fef3c7;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--gray-light);
            color: var(--purple-dark);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: grid;
            grid-template-columns: 220px 1fr;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            background: var(--purple);
            border-right: 1px solid rgba(255,255,255,0.2);
            color: var(--white);
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .brand-header {
            text-align: center;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            margin-bottom: 15px;
        }

        .logo-img {
            width: 90px;
            height: 90px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--white);
            overflow: hidden;
            padding: 5px;
        }

        .logo-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .brand-name {
            font-size: 13px;
            font-weight: bold;
            color: var(--cream);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .brand-contact {
            font-size: 11px;
            color: rgba(255,255,255,0.9);
            line-height: 1.6;
        }

        .nav-menu {
            list-style: none;
            flex: 1;
        }

        .nav-item {
            margin-bottom: 8px;
        }

        .nav-btn {
            width: 100%;
            padding: 10px 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: var(--white);
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-btn.active {
            background: var(--green);
            border-color: var(--green);
            font-weight: bold;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 220px;
            right: 0;
            background: var(--purple);
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 90;
            height: 70px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header h2 {
            color: var(--cream);
            font-size: 20px;
        }

        .progress-bar {
            width: 140px;
            height: 8px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 4px;
            overflow: hidden;
            background: rgba(255,255,255,0.1);
        }

        .progress-fill {
            height: 100%;
            background: var(--green);
        }

        .progress-text {
            font-size: 13px;
            color: var(--cream);
            margin-left: 10px;
            font-weight: 600;
        }

        .header-controls {
            display: flex;
            gap: 12px;
        }

        /* Content Area */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 90px 25px 30px 25px;
            height: 100vh;
        }

        /* ===== SLIDE CONTAINER ===== */
        .slide-container {
            max-width: 900px;
            margin: 0 auto 30px;
            border: 1px solid var(--gray);
            border-radius: 12px;
            padding: 25px 30px;
            height: calc(100vh - 130px);
            display: flex;
            flex-direction: column;
            position: relative;
            background-image: url('https://wenzhannguyen-dot.github.io/gia-su-hoa-ngu-tan-an/NEN.png');
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
        }

        .slide-content {
            flex: 1;
            overflow-y: auto;
            position: relative;
            z-index: 1;
            background: transparent;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .slide-content::-webkit-scrollbar { width: 6px; }
        .slide-content::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 3px; }
        .slide-content::-webkit-scrollbar-thumb { background: var(--purple-light); border-radius: 3px; }

        .slide-title {
            font-size: 22px;
            color: var(--white);
            margin-bottom: 20px;
            padding: 10px 15px;
            background: rgba(124, 58, 237, 0.85);
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.3);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .slide-number {
            background: var(--purple-light);
            border: 1px solid rgba(255,255,255,0.5);
            color: var(--white);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
        }

        .slide-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: auto;
            padding-top: 15px;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
            gap: 20px;
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border: 1px solid;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-orange { background: var(--orange); border-color: var(--orange); color: var(--white); }
        .btn-success { background: var(--green); border-color: var(--green); color: var(--white); }
        .btn-check {
            background: linear-gradient(135deg, var(--orange) 0%, var(--green) 100%);
            border: none;
            color: var(--white);
            padding: 12px 28px;
            font-weight: 700;
        }
        .btn-nav { padding: 12px 28px; font-size: 15px; min-width: 130px; justify-content: center; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-answer {
            padding: 6px 12px;
            border: 1px solid;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-left: auto;
        }
        .btn-show-answer { background: var(--orange); border-color: var(--white); color: var(--white); }
        .btn-hide-answer { background: var(--green); border-color: var(--white); color: var(--white); }

        /* ===== EXERCISE STYLES ===== */

        /* pinyin-select grid */
        .pinyin-select-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .pinyin-select-card {
            background: transparent;
            border: 1px solid var(--gray);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            backdrop-filter: blur(2px);
        }

        .pinyin-select-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .pinyin-hanzi {
            font-size: 36px;
            color: var(--purple);
            font-family: "SimHei", serif;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        .pinyin-dropdown {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--gray);
            border-radius: 8px;
            font-size: 15px;
            text-align: center;
            background: rgba(255,255,255,0.9);
            color: var(--purple-dark);
            cursor: pointer;
        }
        .pinyin-dropdown:focus { border-color: var(--green); outline: none; }
        .pinyin-dropdown.correct { border-color: var(--green); background: #d1fae5; color: var(--green-dark); }
        .pinyin-dropdown.incorrect { border-color: #ef4444; background: #fee2e2; color: #dc2626; }

        .correct-answer-display {
            margin-top: 8px;
            padding: 6px;
            border: 1px solid var(--green);
            border-radius: 8px;
            color: var(--green);
            font-weight: bold;
            display: none;
            font-size: 14px;
            background: rgba(236, 253, 245, 0.9);
        }
        .correct-answer-display.show { display: block; }

        /* fill-blank passage */
        .passage-container {
            background: transparent;
            border: 1px solid var(--gray);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(2px);
            font-family: "SimHei", sans-serif;
            font-size: 20px;
            line-height: 2.2;
            color: var(--gray-dark);
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        .blank-select {
            padding: 4px 8px;
            border: 2px solid var(--purple-light);
            border-radius: 8px;
            font-size: 18px;
            font-family: "SimHei", sans-serif;
            min-width: 80px;
            background: rgba(255,255,255,0.95);
            color: var(--gray-dark);
            cursor: pointer;
            vertical-align: middle;
        }
        .blank-select:focus { border-color: var(--green); outline: none; }
        .blank-select.correct-answer { border-color: var(--green); background: #d1fae5; color: var(--green-dark); font-weight: bold; }
        .blank-select.incorrect-answer { border-color: #ef4444; background: #fee2e2; color: #dc2626; }

        .word-bank {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 15px;
            padding: 12px;
            background: rgba(255,255,255,0.7);
            border: 1px solid var(--purple-light);
            border-radius: 10px;
            backdrop-filter: blur(2px);
        }

        .word-tag {
            padding: 5px 14px;
            background: var(--purple-light);
            color: var(--white);
            border-radius: 20px;
            font-size: 17px;
            font-family: "SimHei", sans-serif;
            font-weight: bold;
        }

        /* sentence arrange */
        .sentence-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .sentence-item {
            background: transparent;
            border: 1px solid var(--gray);
            border-radius: 12px;
            padding: 15px;
            backdrop-filter: blur(2px);
        }

        .sentence-question {
            font-size: 17px;
            font-weight: bold;
            color: var(--purple);
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        .sentence-input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--gray);
            border-radius: 8px;
            font-size: 18px;
            font-family: "SimHei", sans-serif;
            background: rgba(255,255,255,0.9);
            color: var(--purple-dark);
        }
        .sentence-input:focus { border-color: var(--green); outline: none; }
        .sentence-input.correct { border-color: var(--green); background: #d1fae5; color: var(--green-dark); }
        .sentence-input.incorrect { border-color: #ef4444; background: #fee2e2; color: #dc2626; }

        /* dialogue */
        .dialogue-container { display: flex; flex-direction: column; gap: 12px; }

        .dialogue-item {
            background: transparent;
            border: 1px solid var(--gray);
            border-radius: 12px;
            padding: 15px;
            backdrop-filter: blur(2px);
        }

        .dialogue-speaker {
            font-weight: bold;
            color: var(--green-dark);
            margin-bottom: 8px;
            font-size: 16px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        .dialogue-text {
            font-size: 17px;
            line-height: 1.6;
            color: var(--gray-dark);
            font-family: "SimHei", sans-serif;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        .dialogue-blank-select {
            padding: 4px 8px;
            border: 2px solid var(--purple-light);
            border-radius: 8px;
            font-size: 16px;
            font-family: "SimHei", sans-serif;
            min-width: 120px;
            background: rgba(255,255,255,0.95);
            color: var(--gray-dark);
            cursor: pointer;
            vertical-align: middle;
        }
        .dialogue-blank-select:focus { border-color: var(--green); outline: none; }
        .dialogue-blank-select.correct-answer { border-color: var(--green); background: #d1fae5; color: var(--green-dark); font-weight: bold; }

        /* question transform / error correct */
        .transform-list { display: flex; flex-direction: column; gap: 15px; }

        .transform-item {
            background: transparent;
            border: 1px solid var(--gray);
            border-radius: 12px;
            padding: 15px;
            backdrop-filter: blur(2px);
        }

        .transform-original {
            font-size: 18px;
            color: var(--gray-dark);
            font-family: "SimHei", sans-serif;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        .transform-input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--gray);
            border-radius: 8px;
            font-size: 18px;
            font-family: "SimHei", sans-serif;
            background: rgba(255,255,255,0.9);
            color: var(--purple-dark);
        }
        .transform-input:focus { border-color: var(--green); outline: none; }
        .transform-input.correct { border-color: var(--green); background: #d1fae5; color: var(--green-dark); }
        .transform-input.incorrect { border-color: #ef4444; background: #fee2e2; color: #dc2626; }

        /* hanzi-write passage */
        .passage-write {
            background: transparent;
            border: 1px solid var(--gray);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(2px);
            font-family: "SimHei", sans-serif;
            font-size: 20px;
            line-height: 2.5;
            color: var(--gray-dark);
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        .write-blank {
            display: inline-block;
            min-width: 80px;
            border-bottom: 2px solid var(--purple-light);
            margin: 0 4px;
            vertical-align: bottom;
            position: relative;
        }

        .write-input {
            width: 100%;
            min-width: 80px;
            border: none;
            border-bottom: 2px solid var(--purple-light);
            background: rgba(255,255,255,0.8);
            font-size: 20px;
            font-family: "SimHei", sans-serif;
            color: var(--purple-dark);
            text-align: center;
            outline: none;
            vertical-align: middle;
        }
        .write-input:focus { border-bottom-color: var(--green); }
        .write-input.correct { border-bottom-color: var(--green); color: var(--green-dark); background: rgba(209,250,229,0.8); }
        .write-input.incorrect { border-bottom-color: #ef4444; color: #dc2626; background: rgba(254,226,226,0.8); }

        /* char structure */
        .char-structure {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            padding: 25px;
            background: transparent;
            border: 1px solid var(--gray);
            border-radius: 16px;
            flex-wrap: wrap;
            backdrop-filter: blur(2px);
        }

        .char-box {
            text-align: center;
            padding: 18px;
            background: rgba(255,255,255,0.9);
            border: 1px solid var(--gray);
            border-radius: 12px;
            min-width: 100px;
        }

        .char-display {
            font-size: 44px;
            color: var(--green-dark);
            margin-bottom: 6px;
            font-family: "SimHei", serif;
            font-weight: bold;
        }

        .char-pinyin { font-size: 15px; color: var(--gray); font-weight: 600; }

        /* translation */
        .translation-list { display: flex; flex-direction: column; gap: 12px; }

        .translation-item {
            background: transparent;
            border: 1px solid var(--gray);
            border-radius: 12px;
            padding: 15px;
            backdrop-filter: blur(2px);
        }

        .translation-vi {
            font-size: 16px;
            color: var(--gray-dark);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        .translation-cn {
            font-size: 20px;
            color: var(--green-dark);
            font-family: "SimHei", sans-serif;
            padding-top: 10px;
            border-top: 1px dashed var(--gray);
            display: none;
            margin-top: 8px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        .translation-item.revealed .translation-cn { display: block; }
        .translation-item.revealed { border-color: var(--green); background: rgba(240, 253, 244, 0.5); }

        /* result modal */
        .result-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(124, 58, 237, 0.8);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }

        .result-card {
            background: var(--white);
            border: 1px solid var(--purple-light);
            padding: 30px; border-radius: 20px; text-align: center; max-width: 400px;
        }

        .score-circle {
            width: 120px; height: 120px; border-radius: 50%;
            border: 1px solid var(--purple-light);
            display: flex; align-items: center; justify-content: center;
            margin: 15px auto;
            background: conic-gradient(var(--green) calc(var(--score) * 1%), var(--gray-light) calc(var(--score) * 1%));
            position: relative;
        }
        .score-circle::before {
            content: ''; position: absolute;
            width: 90px; height: 90px;
            background: var(--white); border-radius: 50%;
        }
        .score-text { position: relative; font-size: 28px; font-weight: bold; color: var(--purple); }

        .question-header {
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
        }

        .text-center { text-align: center; }

        @media (max-width: 768px) {
            .app-container { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .header { left: 0; height: 60px; }
            .slide-container { height: calc(100vh - 110px); padding: 15px; }
            .pinyin-select-grid { grid-template-columns: 1fr; }
            .slide-nav { gap: 10px; }
            .btn-nav { padding: 10px 20px; font-size: 14px; min-width: 100px; }
        }
    </style>

    <script>
        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {

        function init() {
            renderSlide(currentSlide);

        function renderSlide(index) {
            currentSlide = index;
            const exercise = exercises[index];
            const container = document.getElementById('content-area');

            document.getElementById('header-title').textContent =
                index === 0 ? 'BÀI 04: 您贵姓' : `Bài ${index}: ${exercise.title}`;

            document.querySelectorAll('.nav-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
                if (checkedAnswers[i] && i > 0) {
                    btn.classList.add('completed');
                }
            });

            let html = '<div class="slide-container">';
            html += '<div class="slide-content">';
            html += `<h3 class="slide-title"><span class="slide-number">${index}</span>${exercise.title}</h3>`;

            switch (exercise.type) {
                case 'intro':               html += exercise.content; break;
                case 'pinyin-select':       html += renderPinyinSelect(exercise.data, index); break;
                case 'fill-blank-passage':  html += renderFillBlankPassage(exercise, index); break;
                case 'sentence-arrange':    html += renderSentenceArrange(exercise.data, index); break;
                case 'dialogue':            html += renderDialogue(exercise.data, index); break;
                case 'question-transform':  html += renderTransform(exercise.data, index, '→ Câu hỏi:'); break;
                case 'error-correct':       html += renderTransform(exercise.data, index, '→ Sửa lại:'); break;
                case 'hanzi-write-passage': html += renderHanziWritePassage(exercise.data, index); break;
                case 'char-structure':      html += renderCharStructure(); break;
                case 'translation':         html += renderTranslation(exercise.data, index); break;
            }

            html += '</div>';
            html += `<div class="slide-nav">`;
            html += `<button class="btn btn-orange btn-nav" onclick="prevSlide()" ${index === 0 ? 'disabled' : ''}>← Bài trước</button>`;
            html += `<button class="btn btn-success btn-nav" onclick="nextSlide()" ${index === exercises.length - 1 ? 'disabled' : ''}>Bài sau →</button>`;
            html += `</div>`;
            html += '</div>';
            container.innerHTML = html;
        }

        function nextSlide() { if (currentSlide < exercises.length - 1) renderSlide(currentSlide + 1); }
        function prevSlide() { if (currentSlide > 0) renderSlide(currentSlide - 1); }
        function goToSlide(index) { renderSlide(index); }
        function resetCurrent() { delete checkedAnswers[currentSlide]; renderSlide(currentSlide); }

        // ---- RENDER FUNCTIONS ----

        function renderPinyinSelect(data, slideIndex) {
            let html = '<div class="pinyin-select-grid">';
            data.forEach((item, idx) => {
                const shuffledOptions = shuffleArray([...item.options]);
                html += `
                    <div class="pinyin-select-card">
                        <div class="pinyin-select-header">
                            <div class="pinyin-hanzi">${item.hanzi}</div>
                            <button class="btn-answer btn-show-answer" onclick="toggleAnswer(this, 'pinyin-select', ${slideIndex}, ${idx})">
                                Hiện đáp án
                            </button>
                        </div>
                        <select class="pinyin-dropdown"
                                data-slide="${slideIndex}"
                                data-index="${idx}"
                                data-answer="${item.answer}"
                                id="pinyin-select-${slideIndex}-${idx}">
                            <option value="">-- Chọn phiên âm --</option>
                            ${shuffledOptions.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
                        </select>
                        <div class="correct-answer-display" id="pinyin-select-answer-${slideIndex}-${idx}">
                            Đáp án đúng: ${item.answer}
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            return html;
        }

        function renderFillBlankPassage(exercise, slideIndex) {
            // Word bank
            let html = '<div class="word-bank">';
            html += '<span style="font-size:13px;color:var(--gray);font-weight:bold;align-self:center;">Từ:</span>';
            exercise.wordBank.forEach(w => {
                html += `<span class="word-tag">${w}</span>`;
            });
            html += '</div>';

            // Passage
            html += '<div class="passage-container">';
            exercise.passage.forEach(token => {
                if (token.type === 'text') {
                    html += `<span>${token.text}</span>`;
                } else if (token.type === 'newline') {
                    html += `<br><span>${token.text}</span>`;
                } else if (token.type === 'blank') {
                    const shuffled = shuffleArray([...token.options]);
                    html += `
                        <select class="blank-select"
                                data-slide="${slideIndex}"
                                data-id="${token.id}"
                                data-answer="${token.answer}"
                                id="blank-${slideIndex}-${token.id}">
                            <option value="">__</option>
                            ${shuffled.map(o => `<option value="${o}">${o}</option>`).join('')}
                        </select>
                    `;
                }
            });
            html += '</div>';
            html += `<div style="text-align:center;margin-top:12px;">
                <button class="btn-answer btn-show-answer" onclick="showPassageAnswers(${slideIndex})">Hiện đáp án</button>
            </div>`;
            return html;
        }

                html += `

        function renderDialogue(data, slideIndex) {
            let html = '<div class="dialogue-container">';

                html += `
                    <div class="transform-item">
                        <div class="question-header">
                            <div class="transform-original">${item.original}</div>
                            <button class="btn-answer btn-show-answer" onclick="toggleAnswer(this, 'transform', ${slideIndex}, ${idx})">
                                Hiện đáp án
                            </button>
                        </div>
                        <div style="font-size:13px;color:var(--gray);margin-bottom:6px;">${label}</div>
                        <select class="dialogue-blank-select"
                                style="width:100%;font-size:17px;"
                                data-slide="${slideIndex}"
                                data-index="${idx}"
                                data-answer="${item.answer}"
                                id="transform-${slideIndex}-${idx}">
                            <option value="">-- Chọn đáp án --</option>
                            ${shuffled.map(o => `<option value="${o}">${o}</option>`).join('')}
                        </select>
                        <div class="correct-answer-display" id="transform-answer-${slideIndex}-${idx}" style="margin-top:8px;font-family:SimHei;font-size:18px;">
                            ${item.answer}
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            return html;
        }

        function renderHanziWritePassage(data, slideIndex) {
            // Passage text with blanks corresponding to data items
            // PDF text: 我__(rènshi)王兰，她是__(xuéshēng)。认识她我__(hěn)__(gāoxìng)。
            // 她爸爸，妈妈__(shēntǐ)都很好，__(gōngzuò)__(yě)很忙。
            const passageHTML = `
                <div class="passage-write">
                    我<input class="write-input" style="width:70px" data-slide="${slideIndex}" data-index="0" data-answer="认识" id="hw-${slideIndex}-0" placeholder="rènshi">
                    王兰，她是
                    <input class="write-input" style="width:80px" data-slide="${slideIndex}" data-index="1" data-answer="学生" id="hw-${slideIndex}-1" placeholder="xuéshēng">
                    。认识她我
                    <input class="write-input" style="width:45px" data-slide="${slideIndex}" data-index="2" data-answer="很" id="hw-${slideIndex}-2" placeholder="hěn">
                    <input class="write-input" style="width:70px" data-slide="${slideIndex}" data-index="3" data-answer="高兴" id="hw-${slideIndex}-3" placeholder="gāoxìng">
                    。她爸爸，妈妈
                    <input class="write-input" style="width:70px" data-slide="${slideIndex}" data-index="4" data-answer="身体" id="hw-${slideIndex}-4" placeholder="shēntǐ">
                    都很好，
                    <input class="write-input" style="width:70px" data-slide="${slideIndex}" data-index="5" data-answer="工作" id="hw-${slideIndex}-5" placeholder="gōngzuò">
                    <input class="write-input" style="width:45px" data-slide="${slideIndex}" data-index="6" data-answer="也" id="hw-${slideIndex}-6" placeholder="yě">
                    很忙。
                </div>
            `;

            // Show answer list
            let answerList = '<div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;">';
            data.forEach((item, idx) => {
                answerList += `
                    <div style="background:rgba(255,255,255,0.7);border:1px solid var(--gray);border-radius:8px;padding:6px 12px;text-align:center;font-family:SimHei;font-size:16px;">
                        <div style="font-size:12px;color:var(--gray);">${item.pinyin}</div>
                        <div class="correct-answer-display" id="hw-answer-${slideIndex}-${idx}" style="font-size:18px;color:var(--purple);border:none;padding:0;background:transparent;">${item.hanzi}</div>
                    </div>
                `;
            });
            answerList += '</div>';
            answerList += `<div style="text-align:center;margin-top:10px;">
                <button class="btn-answer btn-show-answer" onclick="showHanziPassageAnswers(${slideIndex})">Hiện đáp án</button>
            </div>`;

            return passageHTML + answerList;
        }

        function renderCharStructure() {
            // Bài 8: chữ có thiên bàng 口: 吗(ma) 呢(ne) 叫(jiào) 号(hào) 名(míng)
            let html = '<div class="char-structure">';
            const chars = [
                { hanzi: '吗', pinyin: 'ma' },
                { hanzi: '呢', pinyin: 'ne' },
                { hanzi: '叫', pinyin: 'jiào' },
                { hanzi: '号', pinyin: 'hào' },
                { hanzi: '名', pinyin: 'míng' }
            ];
            chars.forEach(c => {
                html += `
                    <div class="char-box">
                        <div class="char-display">${c.hanzi}</div>
                        <div class="char-pinyin">${c.pinyin}</div>
                    </div>
                `;
            });
            html += `</div>
            <div style="text-align:center;margin-top:20px;padding:15px;border:1px solid var(--gray);border-radius:12px;font-size:14px;background:rgba(240,253,244,0.7);backdrop-filter:blur(2px);">
                <strong style="color:var(--green-dark);">Ghi chú:</strong>
                <span style="color:var(--gray-dark);">Các chữ 吗、呢、叫、号、名 đều có thiên bàng 口 (khẩu).</span>
            </div>`;
            return html;
        }

        function renderTranslation(data, slideIndex) {
            let html = '<div class="translation-list">';
            data.forEach((item, idx) => {
                html += `
                    <div class="translation-item" id="trans-${slideIndex}-${idx}" data-slide="${slideIndex}" data-index="${idx}">
                        <div class="question-header">
                            <div class="translation-vi">
                                <span style="color: var(--green); font-weight: bold;">${idx + 1}.</span> ${item.vi}
                            </div>
                            <button class="btn-answer btn-show-answer" onclick="toggleTranslationAnswer(this, ${slideIndex}, ${idx})">
                                Hiện đáp án
                            </button>
                        </div>
                        <div class="translation-cn" data-answer="${item.cn}">${item.cn}</div>
                    </div>
                `;
            });
            html += '</div>';
            return html;
        }

        // ---- TOGGLE / ANSWER FUNCTIONS ----

        function toggleAnswer(btn, type, slideIndex, idx) {
            const isShowing = btn.textContent === 'Ẩn';
            btn.textContent = isShowing ? 'Hiện đáp án' : 'Ẩn';
            btn.className = isShowing ? 'btn-answer btn-show-answer' : 'btn-answer btn-hide-answer';

            let answerEl;
            if (type === 'pinyin-select') {
                answerEl = document.getElementById(`pinyin-select-answer-${slideIndex}-${idx}`);
            } else if (type === 'sentence') {
                answerEl = document.getElementById(`sentence-answer-${slideIndex}-${idx}`);
            } else if (type === 'dialogue') {
                answerEl = document.getElementById(`dialogue-answer-${slideIndex}-${idx}`);
            } else if (type === 'transform') {
                answerEl = document.getElementById(`transform-answer-${slideIndex}-${idx}`);
            }
            if (answerEl) answerEl.classList.toggle('show', !isShowing);
        }

        function toggleTranslationAnswer(btn, slideIndex, idx) {
            const isShowing = btn.textContent === 'Ẩn';
            btn.textContent = isShowing ? 'Hiện đáp án' : 'Ẩn';
            btn.className = isShowing ? 'btn-answer btn-show-answer' : 'btn-answer btn-hide-answer';
            const item = document.getElementById(`trans-${slideIndex}-${idx}`);
            item.classList.toggle('revealed', !isShowing);
        }

        function showPassageAnswers(slideIndex) {
            document.querySelectorAll(`.blank-select[data-slide="${slideIndex}"]`).forEach(sel => {
                sel.value = sel.dataset.answer;
                sel.classList.add('correct-answer');
            });
        }

        function showHanziPassageAnswers(slideIndex) {
            const ex = exercises[slideIndex];
            ex.data.forEach((item, idx) => {
                const input = document.getElementById(`hw-${slideIndex}-${idx}`);
                if (input) { input.value = item.hanzi; input.classList.add('correct'); }
                const answerEl = document.getElementById(`hw-answer-${slideIndex}-${idx}`);
                if (answerEl) answerEl.classList.add('show');
            });
        }

        // ---- CHECK ANSWERS ----

        function checkAndShowAnswers() {
            const exercise = exercises[currentSlide];
            if (exercise.type === 'intro' || exercise.type === 'char-structure') {
                showResult(1, 1);
                return;
            }

            let correct = 0;
            let total = 0;

            switch (exercise.type) {
                case 'pinyin-select':
                    document.querySelectorAll('.pinyin-dropdown').forEach(select => {
                        const isCorrect = select.value === select.dataset.answer;
                        select.classList.toggle('correct', isCorrect);
                        select.classList.toggle('incorrect', !isCorrect && select.value !== '');
                        const answerId = select.nextElementSibling.id;
                        const answerEl = document.getElementById(answerId);
                        if (answerEl && !isCorrect) answerEl.classList.add('show');
                        if (isCorrect) correct++;
                        total++;
                    });
                    break;

                case 'fill-blank-passage':
                    document.querySelectorAll(`.blank-select[data-slide="${currentSlide}"]`).forEach(sel => {
                        const isCorrect = sel.value === sel.dataset.answer;
                        sel.classList.toggle('correct-answer', isCorrect);
                        sel.classList.toggle('incorrect-answer', !isCorrect && sel.value !== '');
                        if (isCorrect) correct++;
                        total++;
                    });
                    break;

                case 'sentence-arrange':
                    document.querySelectorAll('.sentence-input').forEach(input => {
                        const isCorrect = input.value.trim() === input.dataset.answer;
                        input.classList.toggle('correct', isCorrect);
                        input.classList.toggle('incorrect', !isCorrect && input.value !== '');
                        const answerEl = document.getElementById(`sentence-answer-${input.dataset.slide}-${input.dataset.index}`);
                        if (answerEl && !isCorrect) answerEl.classList.add('show');
                        if (isCorrect) correct++;
                        total++;
                    });
                    break;

                case 'dialogue':
                    document.querySelectorAll('.dialogue-blank-select').forEach(select => {
                        const isCorrect = select.value === select.dataset.answer;
                        select.classList.toggle('correct-answer', isCorrect);
                        select.style.borderColor = isCorrect ? 'var(--green)' : (select.value ? '#ef4444' : '');
                        const answerEl = document.getElementById(`dialogue-answer-${select.dataset.slide}-${select.dataset.index}`);
                        if (answerEl && !isCorrect && select.value) answerEl.classList.add('show');
                        if (isCorrect) correct++;
                        total++;
                    });
                    break;

                case 'question-transform':
                case 'error-correct':
                    document.querySelectorAll(`select[id^="transform-${currentSlide}"]`).forEach(sel => {
                        const isCorrect = sel.value === sel.dataset.answer;
                        sel.style.borderColor = isCorrect ? 'var(--green)' : (sel.value ? '#ef4444' : '');
                        sel.style.background = isCorrect ? '#d1fae5' : '';
                        const answerEl = document.getElementById(`transform-answer-${sel.dataset.slide}-${sel.dataset.index}`);
                        if (answerEl && !isCorrect) answerEl.classList.add('show');
                        if (isCorrect) correct++;
                        total++;
                    });
                    break;

                case 'hanzi-write-passage':
                    document.querySelectorAll(`.write-input[data-slide="${currentSlide}"]`).forEach(input => {
                        const isCorrect = input.value.trim() === input.dataset.answer;
                        input.classList.toggle('correct', isCorrect);
                        input.classList.toggle('incorrect', !isCorrect && input.value !== '');
                        const answerEl = document.getElementById(`hw-answer-${input.dataset.slide}-${input.dataset.index}`);
                        if (answerEl && !isCorrect) answerEl.classList.add('show');
                        if (isCorrect) correct++;
                        total++;
                    });
                    break;

                case 'translation':
                    document.querySelectorAll('.translation-item').forEach(item => {
                        if (!item.classList.contains('revealed')) {
                            item.classList.add('revealed');
                            const btn = item.querySelector('.btn-answer');
                            if (btn) { btn.textContent = 'Ẩn'; btn.className = 'btn-answer btn-hide-answer'; }
                        }
                        total++;
                        correct++;
                    });
                    break;
            }

            checkedAnswers[currentSlide] = true;
            showResult(correct, total);
            updateProgress();
        }

        function showResult(correct, total) {
            const modal = document.getElementById('result-modal');
            const circle = document.getElementById('score-circle');
            const text = document.getElementById('score-text');
            const msg = document.getElementById('score-message');
            const percentage = total > 0 ? (correct / total) * 100 : 0;

            circle.style.setProperty('--score', percentage);
            text.textContent = `${correct}/${total}`;

            if (percentage === 100) {
                msg.textContent = '🎉 Xuất sắc! Bạn đã làm đúng hết!';
                msg.style.color = 'var(--green)';
            } else if (percentage >= 80) {
                msg.textContent = '👏 Rất tốt! Cố gắng thêm!';
                msg.style.color = 'var(--green)';
            } else if (percentage >= 60) {
                msg.textContent = '👍 Khá đấy! Ôn lại phần sai nhé!';
                msg.style.color = 'var(--orange-dark)';
            } else {
                msg.textContent = '💪 Cần cố gắng thêm! Đã hiện đáp án đúng.';
                msg.style.color = '#dc2626';
            }

            modal.style.display = 'flex';
        }

        function closeModal(e) {
            if (!e || e.target.id === 'result-modal') {
                document.getElementById('result-modal').style.display = 'none';
            }
        }

        function updateProgress() {
            const completed = Object.keys(checkedAnswers).length;
            const total = exercises.length - 1;
            const percentage = (completed / total) * 100;
            document.getElementById('progress-bar').style.width = percentage + '%';
            document.getElementById('progress-text').textContent = `${completed}/${total}`;
        }

        window.addEventListener('load', () => { init(); });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        });
    </script>
</body>
</html>
