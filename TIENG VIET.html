<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>越南语学习 - Tiếng Việt</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f9f9f9;
            color: #1a1a1a;
            line-height: 1.5;
            height: 100vh;
            overflow: hidden;
            -webkit-text-size-adjust: 100%;
        }

        .app-container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        /* Tab Navigation */
        .tab-container {
            background: #fff;
            border-bottom: 2px solid #e5e5e5;
            display: flex;
            justify-content: center;
            padding: 0 20px;
            flex-shrink: 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .tab-nav {
            display: flex;
            gap: 0;
            min-width: max-content;
        }

        .tab-button {
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 500;
            color: #666;
            background: none;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            white-space: nowrap;
        }

        .tab-button:hover {
            color: #1a1a1a;
            background: #f9f9f9;
        }

        .tab-button.active {
            color: #1a1a1a;
            border-bottom-color: #1a1a1a;
            font-weight: 600;
        }

        /* Content Container */
        .content-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* Tab Panel */
        .tab-panel {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: row;
        }

        .tab-panel.active {
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #fff;
            border-right: 1px solid #e5e5e5;
            display: flex;
            flex-direction: column;
            height: 100%;
            flex-shrink: 0;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
            flex-shrink: 0;
        }

        .sidebar-title {
            font-size: 22px;
            font-weight: 600;
            color: #1a1a1a;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        .sidebar-subtitle {
            font-size: 16px;
            color: #999;
            margin-top: 4px;
        }

        .nav-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            -webkit-overflow-scrolling: touch;
        }

        .nav-item {
            padding: 14px 12px;
            margin-bottom: 4px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-item:hover {
            background: #f5f5f5;
        }

        .nav-item.active {
            background: #f0f0f0;
        }

        .nav-title-cn {
            font-size: 22px;
            font-weight: 500;
            color: #1a1a1a;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            line-height: 1.4;
        }

        .nav-title-vi {
            font-size: 16px;
            color: #666;
            margin-top: 4px;
            line-height: 1.4;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid #f0f0f0;
            font-size: 14px;
            color: #999;
            text-align: center;
            flex-shrink: 0;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
            background: #f9f9f9;
        }

        .top-bar {
            background: #fff;
            border-bottom: 1px solid #e5e5e5;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            flex-shrink: 0;
        }

        .page-title {
            font-size: 22px;
            font-weight: 600;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 60%;
        }

        .controls-group {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-shrink: 0;
        }

        .control-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            color: #666;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border: 1px solid #e0e0e0;
            background: #fff;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-icon:hover {
            background: #f5f5f5;
        }

        .btn-icon.active {
            background: #1a1a1a;
            color: #fff;
            border-color: #1a1a1a;
        }

        select {
            padding: 6px 10px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            background: #fff;
            color: #444;
            cursor: pointer;
        }

        .content-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 24px;
            -webkit-overflow-scrolling: touch;
        }

        .content-card {
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e5e5e5;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        .card-header {
            padding: 24px;
            border-bottom: 1px solid #f0f0f0;
        }

        .card-title {
            font-size: 22px;
            font-weight: 600;
            color: #1a1a1a;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            line-height: 1.4;
        }

        .card-subtitle {
            font-size: 16px;
            color: #666;
            margin-top: 6px;
            line-height: 1.4;
        }

        .card-body {
            padding: 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            width: 100%;
        }

        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            width: 100%;
        }

        .data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 22px;
            min-width: 400px;
        }

        .data-table th {
            text-align: left;
            padding: 20px 24px;
            font-weight: 500;
            color: #999;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: #fafafa;
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .data-table td {
            padding: 20px 24px;
            border-bottom: 1px solid #f5f5f5;
            vertical-align: middle;
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .data-table tr:hover {
            background: #fafafa;
        }

        .col-num {
            width: 80px;
            text-align: center !important;
            font-weight: 500;
            color: #999;
            font-size: 18px;
        }

        .col-audio {
            width: 60px;
            padding: 12px !important;
            text-align: center;
        }

        .audio-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid #e0e0e0;
            background: #fff;
            color: #1a1a1a;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .audio-btn:hover {
            background: #1a1a1a;
            color: #fff;
            border-color: #1a1a1a;
        }

        .audio-btn.playing {
            background: #1a1a1a;
            color: #fff;
            border-color: #1a1a1a;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .vi-text {
            font-size: 22px;
            color: #1a1a1a;
            font-weight: 500;
            line-height: 1.5;
        }

        .cn-text {
            font-size: 22px;
            color: #666;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            line-height: 1.5;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .tab-container {
                padding: 0 8px;
            }

            .tab-button {
                padding: 12px 16px;
                font-size: 15px;
            }

            .tab-panel {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                max-height: 160px;
                border-right: none;
                border-bottom: 1px solid #e5e5e5;
                flex-shrink: 0;
            }

            .sidebar-header {
                padding: 12px 16px;
            }

            .sidebar-title {
                font-size: 18px;
            }

            .sidebar-subtitle {
                font-size: 14px;
            }

            .nav-list {
                padding: 8px;
                display: flex;
                gap: 8px;
                overflow-x: auto;
                overflow-y: hidden;
                -webkit-overflow-scrolling: touch;
                flex-direction: row;
                white-space: nowrap;
                height: auto;
            }

            .nav-item {
                padding: 10px 14px;
                margin-bottom: 0;
                flex-shrink: 0;
                min-width: 120px;
                max-width: 160px;
            }

            .nav-title-cn {
                font-size: 16px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .nav-title-vi {
                font-size: 13px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .sidebar-footer {
                display: none;
            }

            .main-content {
                flex: 1;
                min-height: 0;
                overflow: hidden;
            }

            .top-bar {
                padding: 12px 16px;
                height: auto;
                min-height: 60px;
                flex-wrap: wrap;
                gap: 12px;
            }

            .page-title {
                font-size: 18px;
                max-width: 100%;
            }

            .controls-group {
                gap: 12px;
                width: auto;
            }

            .control-item {
                font-size: 14px;
            }

            .btn-icon {
                width: 32px;
                height: 32px;
                font-size: 14px;
            }

            select {
                font-size: 14px;
                padding: 5px 8px;
            }

            .content-scroll {
                padding: 12px;
                flex: 1;
                overflow-y: auto;
            }

            .content-card {
                border-radius: 8px;
                margin: 0;
                max-width: none;
            }

            .card-header {
                padding: 16px;
            }

            .card-title {
                font-size: 18px;
            }

            .card-subtitle {
                font-size: 14px;
            }

            .data-table {
                font-size: 16px;
                min-width: 100%;
            }

            .data-table th {
                padding: 12px 8px;
                font-size: 13px;
                position: static;
            }

            .data-table td {
                padding: 12px 8px;
            }

            .col-num {
                width: 50px;
                font-size: 14px;
            }

            .col-audio {
                width: 50px;
                padding: 8px !important;
            }

            .audio-btn {
                width: 32px;
                height: 32px;
                font-size: 12px;
            }

            .vi-text {
                font-size: 16px;
            }

            .cn-text {
                font-size: 16px;
            }
        }

        /* Very small screens */
        @media (max-width: 480px) {
            .tab-button {
                padding: 10px 12px;
                font-size: 14px;
            }

            .sidebar {
                max-height: 140px;
            }

            .nav-item {
                min-width: 100px;
                padding: 8px 12px;
            }

            .nav-title-cn {
                font-size: 15px;
            }

            .nav-title-vi {
                font-size: 12px;
            }

            .data-table {
                font-size: 15px;
            }

            .data-table th {
                padding: 10px 6px;
                font-size: 12px;
            }

            .data-table td {
                padding: 10px 6px;
            }

            .col-num {
                width: 40px;
                font-size: 13px;
            }

            .col-audio {
                width: 45px;
            }

            .audio-btn {
                width: 28px;
                height: 28px;
                font-size: 11px;
            }

            .vi-text, .cn-text {
                font-size: 15px;
            }
        }
    </style>
<base target="_blank">

        // Tab switching
        function switchTab(tab) {
            currentTab = tab;

            // Update tab buttons
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Update tab panels
            document.querySelectorAll('.tab-panel').forEach(panel => {
                panel.classList.remove('active');
            });
            document.getElementById(`tab-${tab}`).classList.add('active');
        }

        // Initialize
        function init() {
            initTab('dulich', lessonsDuLich, 'nhatrang');
            initTab('mausam', lessonsMauSam, 'nhatrang');
            initTab('thuongdung', lessonsThuongDung, 'greetings');
        }

        function initTab(tab, lessons, defaultLesson) {
            renderNav(tab, lessons);
            showLesson(tab, lessons, defaultLesson);
        }

        function renderNav(tab, lessons) {
            const navList = document.getElementById(`navList-${tab}`);
            let html = '';

            for (const [key, lesson] of Object.entries(lessons)) {
                html += `
                    <div class="nav-item ${key === currentLesson[tab] ? 'active' : ''}" 
                         onclick="showLesson('${tab}', ${tab === 'thuongdung' ? 'lessonsThuongDung' : tab === 'mausam' ? 'lessonsMauSam' : 'lessonsDuLich'}, '${key}')" 
                         data-key="${key}">
                        <div class="nav-title-cn">${lesson.title}</div>
                        <div class="nav-title-vi">${lesson.titleVi}</div>
                    </div>
                `;
            }

            navList.innerHTML = html;
        }

        function showLesson(tab, lessons, key) {
            if (typeof lessons === 'string') {
                lessons = eval(lessons);
            }

            currentLesson[tab] = key;

            // Update nav items
            const navList = document.getElementById(`navList-${tab}`);
            navList.querySelectorAll('.nav-item').forEach(item => {
                item.classList.toggle('active', item.dataset.key === key);
            });

            const lesson = lessons[key];
            document.getElementById(`currentTitle-${tab}`).textContent = lesson.title;
            document.getElementById(`cardTitle-${tab}`).textContent = lesson.title;

            if (tab === 'thuongdung') {
                document.getElementById(`cardSubtitle-${tab}`).textContent = lesson.subtitle;
            }

            renderTable(tab, lesson);
        }

        function renderTable(tab, lesson) {
            let html = '<div class="table-wrapper"><table class="data-table"><thead><tr>';
            html += '<th class="col-num">序号</th>';
            html += '<th class="col-audio"></th>';
            html += '<th>越南语</th>';
            html += '<th>中文</th>';
            html += '</tr></thead><tbody>';

            lesson.data.forEach((item, idx) => {
                const num = idx + 1;
                const btnId = `btn-${tab}-${num}`;
                const text = item.vi.replace(/'/g, "\'");

                html += `<tr>
                    <td class="col-num">${num}</td>
                    <td class="col-audio">
                        <button class="audio-btn" id="${btnId}" onclick="speak('${tab}', '${text}', '${btnId}')">▶</button>
                    </td>
                    <td class="vi-text">${item.vi}</td>
                    <td class="cn-text">${item.cn}</td>
                </tr>`;
            });

            html += '</tbody></table></div>';
            document.getElementById(`lessonContent-${tab}`).innerHTML = html;
        }

        function setVoice(tab, type) {
            currentVoice[tab] = type;
            document.getElementById(`voiceF-${tab}`).classList.toggle('active', type === 'female');
            document.getElementById(`voiceM-${tab}`).classList.toggle('active', type === 'male');
        }

        function updateSpeed(tab, val) {
            speechRate[tab] = parseFloat(val);
        }

        function speak(tab, text, btnId) {
            if (!window.speechSynthesis) {
                alert('浏览器不支持语音功能');
                return;
            }

            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'vi-VN';
            utterance.rate = speechRate[tab];
            utterance.pitch = currentVoice[tab] === 'female' ? 1.1 : 0.9;

            const btn = document.getElementById(btnId);
            if (btn) btn.classList.add('playing');

            utterance.onend = () => {
                if (btn) btn.classList.remove('playing');
            };

            window.speechSynthesis.speak(utterance);
        }

        init();
